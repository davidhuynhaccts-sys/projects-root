<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Projects Project</title>

<style>
* { box-sizing: border-box; }

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background: linear-gradient(135deg, #1f2937, #334155);
  color:#111827;
}

.wrap{
  width:min(900px, calc(100% - 48px));
  padding: 70px 50px;
  border-radius: 20px;
  background: #ffffff;
  box-shadow: 0 30px 80px rgba(0,0,0,.25);
  position: relative;
  overflow:hidden;
}

h1{
  margin:0 0 20px;
  font-size: clamp(42px, 6vw, 64px);
  letter-spacing:-0.03em;
  color:#111827;
}

.sub{
  margin:0 0 35px;
  font-size: clamp(18px, 2.2vw, 22px);
  color:#374151;
}

/* idea lab build effect */

.build{
  display:inline-flex;
  gap: 12px;
  margin-left: 6px;
  font-weight:600;
  color:#111827;
}

.word{
  display:inline-flex;
  gap:6px;
  align-items:baseline;
}

.tile{
  width: 10px;
  height: 10px;
  border-radius: 3px;
  background: #2563eb;
  transform: translateY(16px);
  opacity:0;
  animation: place .6s ease forwards;
}

@keyframes place {
  to { transform: translateY(0); opacity:1; }
}

.t1{animation-delay:.1s;}
.t2{animation-delay:.2s;}
.t3{animation-delay:.3s;}
.t4{animation-delay:.4s;}
.t5{animation-delay:.5s;}
.t6{animation-delay:.6s;}
.t7{animation-delay:.7s;}
.t8{animation-delay:.8s;}

/* typing effect */

.typing-container{
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:15px;
  color:#2563eb;
  margin-top:10px;
}

.cursor{
  display:inline-block;
  width:2px;
  background:#2563eb;
  margin-left:4px;
  animation: blink 1s infinite;
  height:1em;
  vertical-align:bottom;
}

@keyframes blink {
  50% { opacity:0; }
}

/* footer */

.footer{
  margin-top: 40px;
  font-size: 14px;
  color:#6b7280;
}

.idea-links{
  display:block;
  margin-top:8px;
  color:#2563eb;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:13px;
  line-height:1.6;
}

</style>
</head>

<body>
  <main class="wrap">
    <h1>The Projects Project</h1>

    <p class="sub">
      A structured
      <span class="build">
        <span class="word">
          <span class="tile t1"></span>
          <span class="tile t2"></span>
          <span class="tile t3"></span>
          <span class="tile t4"></span>
          idea
        </span>
        <span class="word">
          <span class="tile t5"></span>
          <span class="tile t6"></span>
          <span class="tile t7"></span>
          <span class="tile t8"></span>
          lab
        </span>
      </span>.
    </p>

    <div class="typing-container">
      <span id="typed-text"></span><span class="cursor"></span>
    </div>

    <div class="footer">
      Ideas power this lab:
      <div class="idea-links">
        moonshot-socks.projectsproject.com<br>
        accidental-university.projectsproject.com<br>
        quantum-cookbook.projectsproject.com<br>
        polite-chaos.projectsproject.com
      </div>
    </div>

  </main>

<script>
const text = "Shipping small experiments → learning fast → keeping the good ones";
const speed = 35;
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typed-text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();
</script>

</body>
</html>
