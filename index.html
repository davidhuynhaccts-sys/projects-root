<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Projects Project</title>
<meta name="description" content="The Projects Project — A structured idea lab." />

<style>
:root { color-scheme: dark; }

* { box-sizing: border-box; }

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background:
    radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.04), transparent 60%),
    radial-gradient(900px 600px at 80% 80%, rgba(255,255,255,.03), transparent 60%),
    #0d1117;
  color:#e6edf3;
}

.wrap{
  width:min(900px, calc(100% - 48px));
  padding: 64px 36px;
  border-radius: 24px;
  background: rgba(22,27,34,.75);
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 80px rgba(0,0,0,.6);
  border: 1px solid rgba(255,255,255,.06);
  position: relative;
  overflow:hidden;
}

/* subtle animated grid */
.wrap::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px) 0 0 / 32px 32px,
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px) 0 0 / 32px 32px;
  opacity:.25;
  mask-image: radial-gradient(closest-side, rgba(0,0,0,.55), transparent 70%);
  animation: drift 20s linear infinite;
  pointer-events:none;
}

@keyframes drift {
  from { transform: translate3d(0,0,0); }
  to   { transform: translate3d(-32px,-32px,0); }
}

h1{
  margin:0 0 20px;
  font-size: clamp(40px, 6vw, 64px);
  line-height:1.05;
  letter-spacing:-0.03em;
  position:relative;
  z-index:1;
}

.sub{
  margin:0 0 30px;
  font-size: clamp(18px, 2.2vw, 22px);
  line-height:1.5;
  color: rgba(230,237,243,.75);
  position:relative;
  z-index:1;
}

/* idea lab build effect */

.build{
  display:inline-flex;
  gap: 12px;
  margin-left: 6px;
  font-weight:600;
}

.word{
  display:inline-flex;
  gap:6px;
  align-items:baseline;
}

.tile{
  width: 10px;
  height: 10px;
  border-radius: 3px;
  background: rgba(88,166,255,.6);
  transform: translateY(16px);
  opacity:0;
  animation: place .7s cubic-bezier(.2,.8,.2,1) forwards;
}

@keyframes place {
  to { transform: translateY(0); opacity:1; }
}

.t1{animation-delay:.1s;}
.t2{animation-delay:.2s;}
.t3{animation-delay:.3s;}
.t4{animation-delay:.4s;}
.t5{animation-delay:.5s;}
.t6{animation-delay:.6s;}
.t7{animation-delay:.7s;}
.t8{animation-delay:.8s;}

.label{
  position:relative;
  overflow:hidden;
}

/* typing effect */

.typing{
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:14px;
  color:#58a6ff;
  border-right:2px solid #58a6ff;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 4s steps(50,end) forwards,
             blink .8s step-end infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 520px }
}

@keyframes blink {
  50% { border-color: transparent }
}

.footer{
  margin-top: 30px;
  font-size: 14px;
  color: rgba(230,237,243,.45);
}

@media (prefers-reduced-motion: reduce){
  .wrap::before, .tile, .typing { animation:none !important; }
  .tile { opacity:1; transform:none; }
  .typing { width:auto; border:none; }
}

</style>
</head>

<body>
  <main class="wrap">
    <h1>The Projects Project</h1>

    <p class="sub">
      A structured
      <span class="build">
        <span class="word">
          <span class="tile t1"></span>
          <span class="tile t2"></span>
          <span class="tile t3"></span>
          <span class="tile t4"></span>
          <span class="label">idea</span>
        </span>
        <span class="word">
          <span class="tile t5"></span>
          <span class="tile t6"></span>
          <span class="tile t7"></span>
          <span class="tile t8"></span>
          <span class="label">lab</span>
        </span>
      </span>.
    </p>

    <div class="typing">
      Shipping small experiments → learning fast → keeping the good ones
    </div>

    <div class="footer">
      Subdomains power this lab: idea1.projectsproject.com
    </div>

  </main>
</body>
</html>
